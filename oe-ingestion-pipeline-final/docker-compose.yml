# OE Data Intelligence Platform — Local Databricks-Equivalent Stack
#
# WHAT RUNS HERE vs REAL DATABRICKS:
#   apache/spark:3.5.3          → Databricks Runtime (compute)
#   delta-spark 3.2.0           → Delta Lake (open source)
#   MinIO                       → AWS S3 (object storage)
#   JupyterLab                  → Databricks Notebooks
#
# URLS:
#   Spark Master UI  → http://localhost:8080
#   JupyterLab       → http://localhost:8888  (password: databricks)
#   MinIO Console    → http://localhost:9001  (minioadmin / minioadmin)
#
# USAGE:
#   Start:  docker compose up -d
#   Stop:   docker compose down
#   Wipe:   docker compose down -v  (deletes all Delta Lake data)
#
# FIXES APPLIED vs ORIGINAL:
#   - bitnami/spark removed from Docker Hub → apache/spark:3.5.3
#   - apache/spark uses spark-class not start-master.sh scripts
#   - Jupyter: user root + CHOWN_HOME fixes /home/jovyan permission errors
#   - Jupyter: python3 start-notebook.py (start-notebook.sh deprecated)
#   - pip install on single line with || true (YAML multiline broke args)
#   - spark_session.py mounted directly (scripts/ volume not added earlier)
#   - generate_mock_logs.py mounted at root (same reason)
#   - removed obsolete "version:" tag

services:

  # ── Spark Master ─────────────────────────────────────────────────────
  # Cluster coordinator — equivalent to Databricks Control Plane
  # UI: http://localhost:8080
  spark-master:
    image: apache/spark:3.5.3
    container_name: oe-spark-master
    hostname: spark-master
    user: root
    ports:
      - "8080:8080"
      - "7077:7077"
    networks:
      - oe-net
    environment:
      - SPARK_NO_DAEMONIZE=true
    entrypoint: /opt/spark/bin/spark-class
    command: org.apache.spark.deploy.master.Master
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # ── Spark Worker ──────────────────────────────────────────────────────
  # Compute node — equivalent to a Databricks cluster EC2 node
  spark-worker-1:
    image: apache/spark:3.5.3
    container_name: oe-spark-worker-1
    hostname: spark-worker-1
    user: root
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    depends_on:
      spark-master:
        condition: service_healthy
    networks:
      - oe-net
    entrypoint: /opt/spark/bin/spark-class
    command: "org.apache.spark.deploy.worker.Worker spark://spark-master:7077"

  # ── JupyterLab + PySpark ──────────────────────────────────────────────
  # Notebook interface — equivalent to Databricks Notebooks
  # URL:      http://localhost:8888   password: databricks
  # Spark UI: http://localhost:4040   (while a job is running)
  #
  # NOTE: Pipeline runs in local[2] mode inside Jupyter container.
  #       Reason: Jupyter has Spark 3.5.0, worker has 3.5.3 — version
  #       mismatch causes Java serialization errors when using remote master.
  #       local[2] = 2 threads inside Jupyter JVM, no version conflict.
  #       On real Databricks this is not an issue — single runtime version.
  jupyter:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: oe-jupyter
    hostname: jupyter
    user: root
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=databricks
      - CHOWN_HOME=yes
      - CHOWN_HOME_OPTS=-R
      - GRANT_SUDO=yes
      - NB_UID=1000
      - NB_GID=100
      # NOTE: SPARK_MASTER env var intentionally NOT set here.
      # spark_session.py defaults to local[2] to avoid version mismatch.
      # On real Databricks, use DatabricksSession.builder.getOrCreate()
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_ENDPOINT_URL=http://minio:9000
    ports:
      - "8888:8888"
      - "4040:4040"
    volumes:
      # Pipeline code
      - ./pipelines:/home/jovyan/pipelines
      - ./notebooks:/home/jovyan/notebooks
      # Utility scripts mounted at root (not in subdirectory)
      - ./spark_session.py:/home/jovyan/spark_session.py
      - ./generate_mock_logs.py:/home/jovyan/generate_mock_logs.py
      # Sample log files and generated mock-logs output
      - ./sample-logs:/home/jovyan/sample-logs
      - mock-logs:/home/jovyan/mock-logs
    depends_on:
      spark-master:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - oe-net
    command: bash -c "chown -R 1000:100 /home/jovyan && pip install --no-cache-dir --quiet delta-spark==3.2.0 boto3==1.34.0 s3fs==2024.2.0 || true && su jovyan -c 'python3 /usr/local/bin/start-notebook.py --NotebookApp.token=databricks --NotebookApp.password= --notebook-dir=/home/jovyan'"

  # ── MinIO — local S3 ──────────────────────────────────────────────────
  # Stores all Delta Lake Parquet files (Bronze / Silver / Gold)
  # Console: http://localhost:9001   minioadmin / minioadmin
  # S3 API:  http://localhost:9000   (used internally by Spark)
  minio:
    image: minio/minio:latest
    container_name: oe-minio
    hostname: minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - oe-net
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── MinIO Init — creates Medallion buckets once then exits ────────────
  # Runs once at startup, creates bronze/silver/gold/raw-logs buckets.
  # "Exited (0)" in docker compose ps is CORRECT — it's done its job.
  minio-init:
    image: minio/mc:latest
    container_name: oe-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - oe-net
    entrypoint: /bin/sh -c "mc alias set local http://minio:9000 minioadmin minioadmin && mc mb --ignore-existing local/bronze && mc mb --ignore-existing local/silver && mc mb --ignore-existing local/gold && mc mb --ignore-existing local/raw-logs && echo 'Buckets ready: bronze / silver / gold / raw-logs' && exit 0"

volumes:
  minio-data:
    driver: local
    labels:
      description: "Delta Lake storage — Bronze/Silver/Gold Parquet files"
  mock-logs:
    driver: local
    labels:
      description: "Generated mock log files output"

networks:
  oe-net:
    driver: bridge
    name: oe-intelligence-network
