# Local development — placeholder values until real Databricks workspace available
spring:
  config:
    activate:
      on-profile: local

  # Override datasource to use H2 in-memory DB for local dev
  # (no real Databricks connection needed to start the app)
  datasource:
    url: jdbc:h2:mem:oeplatform;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      connection-test-query: SELECT 1

# Placeholder values — Spring won't throw on missing env vars
databricks:
  host: https://placeholder.databricks.com
  token: dapi-placeholder
  warehouse:
    id: placeholder-warehouse
  jobs:
    ingestion-pipeline-id: 1001