# OE Data Intelligence Platform — Local Databricks-Equivalent Stack
# Jupyter fix: use image defaults, install packages via Dockerfile-style init

services:

  spark-master:
    image: apache/spark:3.5.3
    container_name: oe-spark-master
    hostname: spark-master
    user: root
    ports:
      - "8080:8080"
      - "7077:7077"
    networks:
      - oe-net
    environment:
      - SPARK_NO_DAEMONIZE=true
    entrypoint: /opt/spark/bin/spark-class
    command: org.apache.spark.deploy.master.Master
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  spark-worker-1:
    image: apache/spark:3.5.3
    container_name: oe-spark-worker-1
    hostname: spark-worker-1
    user: root
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    depends_on:
      spark-master:
        condition: service_healthy
    networks:
      - oe-net
    entrypoint: /opt/spark/bin/spark-class
    command: "org.apache.spark.deploy.worker.Worker spark://spark-master:7077"

  jupyter:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: oe-jupyter
    hostname: jupyter
    environment:
      - JUPYTER_TOKEN=databricks
      - SPARK_MASTER=spark://spark-master:7077
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_ENDPOINT_URL=http://minio:9000
    ports:
      - "8888:8888"
      - "4040:4040"
    volumes:
      - ./sample-logs:/home/jovyan/sample-logs
      - ./pipelines:/home/jovyan/pipelines
      - ./notebooks:/home/jovyan/notebooks
      - ./src:/home/jovyan/src
      - ./start-jupyter.sh:/usr/local/bin/start-jupyter.sh
    depends_on:
      spark-master:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - oe-net

  minio:
    image: minio/minio:latest
    container_name: oe-minio
    hostname: minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - oe-net
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: oe-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - oe-net
    entrypoint: /bin/sh -c "mc alias set local http://minio:9000 minioadmin minioadmin && mc mb --ignore-existing local/bronze && mc mb --ignore-existing local/silver && mc mb --ignore-existing local/gold && mc mb --ignore-existing local/raw-logs && echo 'Buckets ready' && exit 0"

volumes:
  minio-data:
    driver: local

networks:
  oe-net:
    driver: bridge
    name: oe-intelligence-network