# OE Data Intelligence Platform — Local Databricks-Equivalent Stack
#
# FIXED: bitnami/spark was removed from Docker Hub (Sep 2025).
# Now uses:
#   apache/spark:3.5.3           official Apache Spark image
#   jupyter/pyspark-notebook     Jupyter + PySpark (stable, widely used)
#   minio/minio                  local S3 for Delta Lake storage

services:

  # ── Spark Master ──────────────────────────────────────────────────
  # UI: http://localhost:8080
  spark-master:
    image: apache/spark:3.5.3
    container_name: oe-spark-master
    hostname: spark-master
    user: root
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./sample-logs:/opt/spark/sample-logs
      - spark-logs:/opt/spark/logs
    networks: [oe-net]
    command: >
      bash -c "
        /opt/spark/sbin/start-master.sh &&
        echo 'Spark Master running at spark://spark-master:7077' &&
        tail -f /opt/spark/logs/*.out 2>/dev/null || sleep infinity
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ── Spark Worker ──────────────────────────────────────────────────
  spark-worker-1:
    image: apache/spark:3.5.3
    container_name: oe-spark-worker-1
    hostname: spark-worker-1
    user: root
    environment:
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    depends_on:
      spark-master:
        condition: service_healthy
    networks: [oe-net]
    command: >
      bash -c "
        /opt/spark/sbin/start-worker.sh spark://spark-master:7077 &&
        echo 'Worker 1 connected' &&
        sleep infinity
      "

  # ── JupyterLab + PySpark ──────────────────────────────────────────
  # URL:  http://localhost:8888   password: databricks
  jupyter:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: oe-jupyter
    hostname: jupyter
    user: root
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=databricks
      - GRANT_SUDO=yes
      - SPARK_MASTER=spark://spark-master:7077
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_ENDPOINT_URL=http://minio:9000
    ports:
      - "8888:8888"
      - "4040:4040"
    volumes:
      - ./sample-logs:/home/jovyan/sample-logs
      - ./pipelines:/home/jovyan/pipelines
      - ./notebooks:/home/jovyan/notebooks
      - ./src:/home/jovyan/src
      - jupyter-data:/home/jovyan/.local
    depends_on:
      spark-master:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks: [oe-net]
    command: >
      bash -c "
        echo 'Installing Delta Lake and AWS libs...' &&
        pip install --quiet delta-spark==3.2.0 boto3==1.34.0 s3fs==2024.2.0 &&
        echo 'Packages ready.' &&
        start-notebook.sh
          --NotebookApp.token='databricks'
          --NotebookApp.password=''
          --notebook-dir=/home/jovyan
      "

  # ── MinIO — local S3 for Delta Lake ──────────────────────────────
  # Console: http://localhost:9001   minioadmin / minioadmin
  minio:
    image: minio/minio:latest
    container_name: oe-minio
    hostname: minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks: [oe-net]
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── MinIO Init — creates Bronze/Silver/Gold buckets ───────────────
  minio-init:
    image: minio/mc:latest
    container_name: oe-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks: [oe-net]
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/bronze &&
        mc mb --ignore-existing local/silver &&
        mc mb --ignore-existing local/gold   &&
        mc mb --ignore-existing local/raw-logs &&
        echo 'Buckets ready: bronze / silver / gold / raw-logs' &&
        exit 0
      "

volumes:
  minio-data:
  spark-logs:
  jupyter-data:

networks:
  oe-net:
    driver: bridge
    name: oe-intelligence-network
